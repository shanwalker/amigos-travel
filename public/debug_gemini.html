<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini API Debugger</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 2rem;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.5;
        }

        .status {
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            font-weight: bold;
        }

        .success {
            background-color: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .error {
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        code {
            background: #f3f4f6;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            display: block;
            margin-top: 5px;
            white-space: pre-wrap;
            font-size: 0.85em;
        }
    </style>
</head>

<body>
    <h1>API & Model Debugger</h1>
    <p>Testing API Key: <code>...zCso</code></p>
    <div id="output">Running test...</div>

    <script type="module">
        const API_KEY = "AIzaSyC8TuCEa4VHti_bjbC5AXUiPj6TUhwzCso";
        const outputDiv = document.getElementById("output");

        async function listModels() {
            try {
                outputDiv.innerText = "⏳ listing available models via REST API...";

                // Direct REST call to list models
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${API_KEY}`);
                const data = await response.json();

                if (data.error) {
                    outputDiv.innerHTML = `
                        <div class="status error">
                            ❌ API Error: ${data.error.message}
                            <br>Code: ${data.error.code}
                            <br>Status: ${data.error.status}
                        </div>
                        <p>This usually means "Generative Language API" is not enabled in Google Cloud Console.</p>
                    `;
                    return;
                }

                if (data.models) {
                    const modelNames = data.models.map(m => m.name.replace('models/', '')).join("\n");
                    outputDiv.innerHTML = `
                        <div class="status success">
                            ✅ API Key Works!
                        </div>
                        <p><strong>Available Models:</strong></p>
                        <code>${modelNames}</code>
                        <p>Check if "gemini-1.5-flash" is in this list.</p>
                    `;
                } else {
                    outputDiv.innerHTML = `
                        <div class="status error">
                            ❌ No models found.
                        </div>
                    `;
                }

            } catch (error) {
                console.error(error);
                outputDiv.innerHTML = `
                    <div class="status error">
                        ❌ Network/Fetch Error<br>
                        <strong>Error:</strong> ${error.message}
                    </div>
                `;
            }
        }

        listModels();
    </script>
</body>

</html>
